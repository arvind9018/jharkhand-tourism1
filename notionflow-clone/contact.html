<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact - NotionFlow</title>

<link rel="stylesheet" href="css/style.css">

<style>

/* Contact Page */

.contact-section{
padding:100px 60px;
display:flex;
justify-content:center;
gap:60px;
flex-wrap:wrap;
}

/* Contact Info */

.contact-info{
max-width:350px;
}

.contact-info h2{
font-size:32px;
margin-bottom:20px;
}

.contact-info p{
color:#666;
margin-bottom:20px;
}

.info-box{
margin-bottom:15px;
}

/* Contact Form */

.contact-form{
background:#fafafa;
padding:40px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.05);
width:350px;
}

.contact-form h3{
margin-bottom:20px;
}

.contact-form input,
.contact-form textarea{
width:100%;
padding:12px;
margin-bottom:15px;
border:1px solid #ddd;
border-radius:6px;
}

.contact-form textarea{
height:120px;
resize:none;
}

.contact-form button{
width:100%;
padding:12px;
background:black;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
font-size:16px;
}

/* Header */

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 60px;
border-bottom:1px solid #eee;
}

.logo{
font-size:22px;
font-weight:bold;
}

nav a{
margin:0 12px;
text-decoration:none;
color:#333;
}

footer{
text-align:center;
padding:30px;
border-top:1px solid #eee;
margin-top:60px;
}

</style>

</head>

<body>

<header class="navbar">

<div class="logo">NotionFlow</div>

<nav>
<a href="index.html">Home</a>
<a href="features.html">Features</a>
<a href="pricing.html">Pricing</a>
<a href="contact.html">Contact</a>
</nav>

</header>

<section class="contact-section">

<!-- Contact Info -->

<div class="contact-info">

<h2>Contact Us</h2>

<p>
Have questions about NotionFlow? Our team is here to help.
Send us a message and we'll respond as soon as possible.
</p>

<div class="info-box">
📧 support@notionflow.com
</div>

<div class="info-box">
📍 San Francisco, CA
</div>

<div class="info-box">
📞 +1 123 456 789
</div>

</div>

<!-- Contact Form -->

<div class="contact-form">

<h3>Send a Message</h3>

<form onsubmit="formEvent()">

<input type="text" placeholder="Your Name" required>

<input type="email" placeholder="Your Email" required>

<textarea placeholder="Your Message"></textarea>

<button type="submit">Send Message</button>

</form>

</div>

</section>

<footer>

<p>© 2026 NotionFlow SaaS Platform</p>

</footer>

<script src="js/script.js"></script>

</body>
</html>
