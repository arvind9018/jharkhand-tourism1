<!DOCTYPE html>
<html>
<head>

<title>Pricing - NotionFlow</title>
<link rel="stylesheet" href="style.css">

</head>

<body>

<section class="pricing">

<h1>Choose Your Plan</h1>

<div class="pricing-grid">

<div class="price-card">

<h3>Free</h3>
<p>$0 / month</p>
<button onclick="pricingEvent()">Start Free</button>

</div>

<div class="price-card popular">

<h3>Plus</h3>
<p>$10 / month</p>
<button onclick="pricingEvent()">Upgrade</button>

</div>

<div class="price-card">

<h3>Business</h3>
<p>$20 / month</p>
<button onclick="pricingEvent()">Buy Now</button>

</div>

</div>

</section>

<script src="script.js"></script>

</body>
</html>
